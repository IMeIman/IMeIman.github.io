<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, 
    initial-scale=1.0"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>Formulario</title>
</head>
<body>
    <header>
    <div class="header__container">

    <div class="logo">
      <img src="assets/Vérticelogo.png" alt="Logotipo">
    </div>

    <div class="menu-toggle" id="menu-toggle">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <nav id="nav-menu">
      <a href="index.html" class="nav-link">Inicio</a>
      <a href="about.html" class="nav-link">Sobre nosotros</a>
      <a href="form.html" class="primary__button nav-link">Contacto</a>
    </nav>

    </div>
    </header>
    <div class="grid-2">        
        <div class="card">
        <h2>ENVÍANOS UN MENSAJE</h2>

            <form class="content" action="https://formsubmit.co/verticestudio.web@gmail.com" method="POST">

            <label>Nombre</label>
            <input type="text" name="nombre" required>

            <label>Correo electrónico</label>
            <input type="email" name="email" required>

            <label>Teléfono</label>
            <input type="tel" name="telefono">

            <label>Tipo de servicio</label>
            <select name="servicio">
                <option>Landing Page ($1800)</option>
                <option>Paquete Intermedio ($2800)</option>
                <option>Socio Mensual ($899)</option>
            </select>

            <label>Mensaje</label>
            <textarea name="mensaje" rows="4" required></textarea>

            <button type="submit" class="primary__button">
                Enviar mensaje
            </button>
            </form>
        </div>
        <div class="volante">
            <img src="assets/VOLANTE.png" alt="VOLANTE">
        </div>
        
    </div>
    <script>
        const menuToggle = document.getElementById("menu-toggle");
        const navMenu = document.getElementById("nav-menu");

        menuToggle.addEventListener("click", () => {
        navMenu.classList.toggle("active");
          });
    </script>
</body>
</html>
